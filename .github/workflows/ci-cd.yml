name: CI/CD Pipeline

on:
  push:
    branches: [ main, story/ECommerce/GithubActionsSetup ]
  pull_request:
    branches: [ main, story/ECommerce/GithubActionsSetup ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_DB: ecommerce_db
          POSTGRES_USER: harpreet.saggu
          POSTGRES_PASSWORD: ''
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Backend with Maven
        working-directory: backend
        run: ./mvnw clean install

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      # Add deployment steps here (to Azure, AWS, etc.)
