


name: CI/CD Pipeline
on:
  push:
    branches: [ main, story/ECommerce/GithubActionsSetup ]
  pull_request:
    branches: [ main, story/ECommerce/GithubActionsSetup ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_DB: ecommerce_db
          POSTGRES_USER: harpreet.saggu
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U harpreet.saggu -d ecommerce_db" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Backend with Maven (skip tests)
        working-directory: backend
        run: ./mvnw clean install -DskipTests

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Frontend dependencies
        working-directory: frontend
        run: npm install

  deploy-backend:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Backend with Maven (skip tests)
        working-directory: backend
        run: ./mvnw clean package -DskipTests

      - name: Prepare deployment package for Elastic Beanstalk
        run: |
          cp backend/target/*.jar app.jar
          echo "web: java -jar app.jar --server.port=5000" > Procfile
          zip backend-deploy.zip app.jar Procfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Install AWS CLI
        run: |
          pip install --upgrade pip
          pip install awscli

      - name: Upload deployment package to S3
        run: |
          aws s3 cp backend-deploy.zip s3://elasticbeanstalk-eu-north-1-${{ secrets.AWS_ACCOUNT_ID }}/backend-deploy-${{ github.run_number }}.zip

      - name: Create new application version
        run: |
          VERSION_LABEL=github-${{ github.run_number }}-$(date +%s)
          aws elasticbeanstalk create-application-version \
            --application-name ecommerce-backend \
            --version-label $VERSION_LABEL \
            --source-bundle S3Bucket=elasticbeanstalk-eu-north-1-${{ secrets.AWS_ACCOUNT_ID }},S3Key=backend-deploy-${{ github.run_number }}.zip
          echo "VERSION_LABEL=$VERSION_LABEL" >> $GITHUB_ENV

      - name: Update environment to new version
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name ecommerce-backend-env \
            --version-label ${{ env.VERSION_LABEL }}

  deploy-frontend:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build Frontend
        working-directory: frontend
        run: CI='' npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/build s3://ecommerce-frontend-harpreetsaggu2026 --delete
          aws s3 website s3://ecommerce-frontend-harpreetsaggu2026/ --index-document index.html --error-document index.html

      - name: Build Backend with Maven (skip tests)
        working-directory: backend
        run: ./mvnw clean package -DskipTests

      - name: Prepare deployment package for Elastic Beanstalk
        run: |
          cp backend/target/*.jar app.jar
          echo "web: java -jar app.jar --server.port=5000" > Procfile
          zip backend-deploy.zip app.jar Procfile

      - name: Debug secrets
        run: |
          echo "Key present: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}"
          echo "Secret present: ${{ secrets.AWS_SECRET_ACCESS_KEY != '' }}"
      


      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Install AWS CLI
        run: |
          pip install --upgrade pip
          pip install awscli

      - name: Upload deployment package to S3
        run: |
          aws s3 cp backend-deploy.zip s3://elasticbeanstalk-eu-north-1-${{ secrets.AWS_ACCOUNT_ID }}/backend-deploy-${{ github.run_number }}.zip

      - name: Create new application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name ecommerce-backend \
            --version-label github-${{ github.run_number }} \
            --source-bundle S3Bucket=elasticbeanstalk-eu-north-1-${{ secrets.AWS_ACCOUNT_ID }},S3Key=backend-deploy-${{ github.run_number }}.zip

      - name: Update environment to new version
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name ecommerce-backend-env \
            --version-label github-${{ github.run_number }}
